{% extends "base.html" %}

{% block title %}
Users
{% endblock %}

{% block content %}

<h2 class="mb-4">User Management</h2>

<a href="{{ url_for('users.add_user') }}"
   class="btn btn-primary mb-3">

    Add User

</a>

<table class="table table-striped table-hover">

    <thead>

        <tr>

            <th>ID</th>
            <th>Username</th>
            <th>Role</th>
            <th>Created</th>
            <th>Actions</th>

        </tr>

    </thead>

    <tbody>

        {% for user in users %}

        <tr>

            <td>{{ user.UserID }}</td>

            <td>{{ user.Username }}</td>

            <td>{{ user.Role }}</td>

            <td>{{ user.CreatedDate }}</td>

            <td>

                <a href="{{ url_for('users.edit_user', user_id=user.UserID) }}"
   class="btn btn-warning btn-sm">
    Edit
</a>

<a href="{{ url_for('users.delete_user', user_id=user.UserID) }}"
   class="btn btn-danger btn-sm"
   onclick="return confirm('Delete this user?')">
    Delete
</a>

            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
