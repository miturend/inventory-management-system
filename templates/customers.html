<!DOCTYPE html>
<html>

<head>

    <title>Customers</title>

</head>

<body>

<h1>Customers</h1>
<form method="GET">

    <input
        type="text"
        name="search"
        placeholder="Search Customers..."
        value="{{ search }}">

    <button type="submit">
        Search
    </button>

</form>

<br>

<p>
    <a href="{{ url_for('customers.add_customer') }}">
        <button>Add Customer</button>
    </a>
</p>

<table border="1" cellpadding="10">

<tr>

    <th>ID</th>
    <th>Customer Name</th>
    <th>Phone</th>
    <th>Address</th>
<th>Actions</th>

</tr>

{% for customer in customers %}

<tr>

    <td>{{ customer.CustomerID }}</td>
    <td>{{ customer.CustomerName }}</td>
    <td>{{ customer.Phone }}</td>
    <td>{{ customer.Address }}</td>
    <td>

    <a href="{{ url_for('customers.edit_customer', customer_id=customer.CustomerID) }}">
        <button>Edit</button>
    </a>

    <a href="{{ url_for('customers.delete_customer', customer_id=customer.CustomerID) }}"
       onclick="return confirm('Are you sure you want to delete this customer?');">

        <button>Delete</button>

    </a>

</td>

</tr>

{% endfor %}

</table>

</body>

</html>
