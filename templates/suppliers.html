{% extends "base.html" %}

{% block title %}
Supliers
{% endblock %}

{% block content %}

<h1>Suppliers</h1>
<form method="GET">

    <input
        type="text"
        name="search"
        placeholder="Search Suppliers..."
        value="{{ search }}">

    <button class="btn btn-dark" type="submit">
        Search
    </button>

</form>

<br>

<p>
    <a href="{{ url_for('suppliers.add_supplier') }}">
        <button class="btn btn-primary">Add Supplier</button>
    </a>
</p>

<table border="1" cellpadding="10">

<tr>

    <th>ID</th>
    <th>Supplier Name</th>
    <th>Phone</th>
    <th>Address</th>
<th>Actions</th>

</tr>

{% for supplier in suppliers %}

<tr>

    <td>{{ supplier.SupplierID }}</td>
    <td>{{ supplier.SupplierName }}</td>
    <td>{{ supplier.Phone }}</td>
    <td>{{ supplier.Address }}</td>
    <td>

    <a href="{{ url_for('suppliers.edit_supplier', supplier_id=supplier.SupplierID) }}">
        <button class="btn btn-warning btn-sm">
    Edit
</button>
    </a>

    <a href="{{ url_for('suppliers.delete_supplier', supplier_id=supplier.SupplierID) }}"
       onclick="return confirm('Are you sure you want to delete this supplier?');">

        <button class="btn btn-danger">Delete</button>

    </a>

</td>

</tr>

{% endfor %}

</table>
{% endblock %}
