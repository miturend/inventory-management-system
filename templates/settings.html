{% extends "base.html" %}

{% block title %}
System Settings
{% endblock %}

{% block content %}

<h2>System Settings</h2>

<form method="POST">

    <div class="mb-3">
        <label class="form-label">Business Name</label>
        <input
            type="text"
            class="form-control"
            name="business_name"
            value="{{ settings.BusinessName }}"
            required>
    </div>

    <div class="mb-3">
        <label class="form-label">Business Address</label>
        <textarea
            class="form-control"
            name="address"
            rows="3">{{ settings.BusinessAddress }}</textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Phone</label>
        <input
            type="text"
            class="form-control"
            name="phone"
            value="{{ settings.Phone }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Email</label>
        <input
            type="email"
            class="form-control"
            name="email"
            value="{{ settings.Email }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Currency Symbol</label>
        <input
            type="text"
            class="form-control"
            name="currency"
            value="{{ settings.CurrencySymbol }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Receipt Footer</label>
        <textarea
            class="form-control"
            name="receipt_footer"
            rows="3">{{ settings.ReceiptFooter }}</textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Low Stock Threshold</label>
        <input
            type="number"
            class="form-control"
            name="low_stock"
            value="{{ settings.LowStockThreshold }}">
    </div>

    <button type="submit" class="btn btn-success">
        Save Settings
    </button>

</form>

{% endblock %}
