<!DOCTYPE html>
<html>

<head>

    <title>Products</title>

</head>

<body>

<h1>Products</h1>
<form method="GET">

    <input
        type="text"
        name="search"
        placeholder="Search product..."
        value="{{ search }}">

    <button type="submit">
        Search
    </button>

</form>

<br>

<p>
    <a href="{{ url_for('products.add_product') }}">
        <button>Add Product</button>
    </a>
</p>

<table border="1" cellpadding="10">

<tr>

    <th>ID</th>
    <th>Product Name</th>
    <th>Selling Price</th>
    <th>Stock</th>
<th>Actions</th>

</tr>

{% for product in products %}

<tr>

    <td>{{ product.ProductID }}</td>
    <td>{{ product.ProductName }}</td>
    <td>₦{{ product.SellingPrice }}</td>
    <td>{{ product.Stock }}</td>
    <td>

    <a href="{{ url_for('products.edit_product', product_id=product.ProductID) }}">
        <button>Edit</button>
    </a>

    <a href="{{ url_for('products.delete_product', product_id=product.ProductID) }}"
       onclick="return confirm('Are you sure you want to delete this product?');">

        <button>Delete</button>

    </a>

</td>

</tr>

{% endfor %}

</table>

</body>

</html>
