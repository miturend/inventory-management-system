{% extends "base.html" %}

{% block title %}
Products
{% endblock %}

{% block content %}
<h1>Products</h1>
<form method="GET">

    <input
        type="text"
        name="search"
        placeholder="Search product..."
        value="{{ search }}">

    <button type="submit" class="btn btn-dark">
        Search
    </button>

</form>

<br>

<p>
    <a href="{{ url_for('products.add_product') }}">
        <button class="btn btn-primary">
    Add Product
</button>
    </a>
</p>

<table class="table table-striped table-hover">

<tr>

    <th>ID</th>
    <th>Product Name</th>
    <th>Selling Price</th>
    <th>Stock</th>
<th>Actions</th>

</tr>

{% for product in products %}

<tr>

    <td>{{ product.ProductID }}</td>
    <td>{{ product.ProductName }}</td>
    <td>₦{{ product.SellingPrice }}</td>
    <td>{{ product.Stock }}</td>
    <td>

    <a href="{{ url_for('products.edit_product', product_id=product.ProductID) }}">
        <button class="btn btn-warning btn-sm">
    Edit
</button>
    </a>

    <a href="{{ url_for('products.delete_product', product_id=product.ProductID) }}"
       onclick="return confirm('Are you sure you want to delete this product?');">

        <button class="btn btn-danger btn-sm">
    Delete
</button>

    </a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
