{% extends "base.html" %}

{% block title %}
Add Customer
{% endblock %}

{% block content %}

<form method="POST">

    <p>Customer Name</p>
    <input type="text" name="customer_name" required>

    <p>Phone</p>
    <input type="tel" name="phone" required>

    <p>Address</p>
    <input type="text" name="address" required>

    <br><br>

    <button type="submit">Save Customer</button>

</form>


<br>

<a href="/customers">← Back to Customers</a>

{% endblock %}
