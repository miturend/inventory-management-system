<!DOCTYPE html>
<html>
<head>
    <title>Add Customer</title>
</head>
<body>

<h1>Add Customer</h1>

<form method="POST">

    <p>Customer Name</p>
    <input type="text" name="name" required>

    <p>Phone</p>
    <input type="tel" name="phone" required>

    <p>Address</p>
    <input type="text" name="address" required>

    <br><br>

    <button type="submit">Save Customer</button>

</form>

<br>

</body>
</html>
