{% extends "base.html" %}


{% block title %}
Add Expense
{% endblock %}



{% block content %}


<h2>Add Expense</h2>


<form method="POST">


<div class="mb-3">

<label>
Description
</label>

<input class="form-control"
name="description"
required>

</div>



<div class="mb-3">

<label>
Category
</label>

<input class="form-control"
name="category">

</div>



<div class="mb-3">

<label>
Amount
</label>

<input class="form-control"
type="number"
step="0.01"
name="amount"
required>

</div>



<button class="btn btn-success">

Save Expense

</button>


</form>


{% endblock %}
