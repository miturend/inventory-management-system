{% extends "base.html" %}

{% block title %}
Add User
{% endblock %}

{% block content %}

<h2 class="mb-4">Add User</h2>

<form method="POST">

    <div class="mb-3">
        <label>Username</label>
        <input
            type="text"
            class="form-control"
            name="username"
            required>
    </div>

    <div class="mb-3">

    <label class="form-label">Password</label>

    <div class="input-group">

        <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            required>

        <button
            class="btn btn-outline-secondary"
            type="button"
            onclick="togglePassword('password')">

            👁

        </button>

    </div>

</div>

<div class="mb-3">

    <label class="form-label">Confirm Password</label>

    <div class="input-group">

        <input
            type="password"
            class="form-control"
            id="confirm_password"
            name="confirm_password"
            required>

        <button
            class="btn btn-outline-secondary"
            type="button"
            onclick="togglePassword('confirm_password')">

            👁

        </button>

    </div>

</div>

    <div class="mb-3">
        <label>Role</label>

        <select
            class="form-select"
            name="role">

            <option value="Admin">Admin</option>
            <option value="Manager">Manager</option>
            <option value="Cashier">Cashier</option>

        </select>

    </div>

    <button
        class="btn btn-success">

        Create User

    </button>

</form>

<script>

function togglePassword(id){

    let input = document.getElementById(id);

    if(input.type === "password"){

        input.type = "text";

    }

    else{

        input.type = "password";

    }

}

</script>
{% endblock %}
