<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OKEYSAM INVESTMENTS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-start: #1e3c72;
            --brand-end: #2a5298;
            --accent: #f2b705;
        }

        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--brand-start), var(--brand-end));
            background-attachment: fixed;
            position: relative;
            overflow-x: hidden;
        }

        /* soft decorative blobs */
        body::before,
        body::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.35;
            z-index: 0;
        }

        body::before {
            width: 300px;
            height: 300px;
            background: var(--accent);
            top: -80px;
            left: -80px;
        }

        body::after {
            width: 350px;
            height: 350px;
            background: #ffffff;
            bottom: -100px;
            right: -100px;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .card {
            border: none;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.97);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-body {
            padding: 2.5rem 2.2rem;
        }

        .brand-icon {
            width: 62px;
            height: 62px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--brand-start), var(--brand-end));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 8px 18px rgba(30, 60, 114, 0.35);
        }

        .brand-icon i {
            color: #fff;
            font-size: 1.6rem;
        }

        h2.brand-title {
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--brand-start);
        }

        .subtitle {
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        .form-label {
            font-weight: 500;
            font-size: 0.88rem;
            color: #444;
        }

        .input-group-text {
            background: #f4f6f9;
            border-right: none;
            color: var(--brand-start);
        }

        .form-control {
            border-left: none;
            padding: 0.65rem 0.9rem;
        }

        .input-group:focus-within .input-group-text,
        .input-group:focus-within .form-control {
            border-color: var(--brand-end);
        }

        .form-control:focus {
            box-shadow: none;
            border-color: var(--brand-end);
        }

        .toggle-password {
            background: #f4f6f9;
            border-left: none;
            cursor: pointer;
            color: #777;
        }

        .btn-signin {
            background: linear-gradient(135deg, var(--brand-start), var(--brand-end));
            border: none;
            color: #fff;
            font-weight: 600;
            letter-spacing: 0.5px;
            padding: 0.7rem;
            border-radius: 10px;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(30, 60, 114, 0.35);
            color: #fff;
        }

        .footer-text {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.82rem;
        }

        .icon {
            width: 18px;
            height: 18px;
            display: inline-block;
            vertical-align: middle;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .brand-icon .icon {
            width: 28px;
            height: 28px;
            stroke: #fff;
        }

        .toggle-password .icon {
            width: 18px;
            height: 18px;
        }
    </style>
</head>

<body>

    <div class="login-wrapper">

        <div class="card">
            <div class="card-body">

                <div class="brand-icon">
                    <svg class="icon" viewBox="0 0 24 24"><polyline points="3 17 9 11 13 15 21 7"></polyline><polyline points="14 7 21 7 21 14"></polyline></svg>
                </div>

                <h2 class="text-center brand-title mb-1">OKEYSAM</h2>
                <p class="text-center text-muted subtitle mb-4">Inventory Management System</p>

                {% if error %}
                <div class="alert alert-danger d-flex align-items-center gap-2 py-2" role="alert">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                    <span>{{ error }}</span>
                </div>
                {% endif %}

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><svg class="icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></span>
                            <input
                                type="text"
                                class="form-control"
                                name="username"
                                placeholder="Enter username"
                                required
                                autofocus>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></span>
                            <input
                                type="password"
                                class="form-control"
                                name="password"
                                id="password"
                                placeholder="Enter password"
                                required>
                            <span class="input-group-text toggle-password" onclick="togglePassword()">
                                <svg class="icon" viewBox="0 0 24 24" id="eyeOpen"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                <svg class="icon" viewBox="0 0 24 24" id="eyeClosed" style="display:none"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.7 18.7 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                            </span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-signin w-100 mt-2">
                        Sign In
                    </button>

                </form>

            </div>
        </div>

        <p class="text-center mt-3 footer-text">© OKEYSAM INVESTMENTS</p>

    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const eyeOpen = document.getElementById('eyeOpen');
            const eyeClosed = document.getElementById('eyeClosed');
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            eyeOpen.style.display = isPassword ? 'none' : 'inline-block';
            eyeClosed.style.display = isPassword ? 'inline-block' : 'none';
        }
    </script>

</body>

</html>
