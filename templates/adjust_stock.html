{% extends "base.html" %}

{% block title %}
Adjust Stock
{% endblock %}

{% block content %}

<div class="container">

    <h2>Adjust Stock</h2>

    <div class="card">

        <div class="card-body">

            <h4>{{ product.ProductName }}</h4>

            <p>
                Current Stock:
                <strong>{{ product.Stock }}</strong>
            </p>

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Adjustment
                    </label>

                    <input
                        type="number"
                        step="0.01"
                        name="adjustment"
                        class="form-control"
                        required>

                    <small class="text-muted">
                        Positive = Add Stock
                        <br>
                        Negative = Remove Stock
                    </small>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Reason
                    </label>

                    <textarea
                        name="reason"
                        class="form-control"
                        required></textarea>

                </div>

                <button
                    class="btn btn-warning">

                    Adjust Stock

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
